<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flatchat Games - Kit Chain</title>
  <link rel="icon" type="image/x-icon" href="../icons/flatchat-small.webp">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="data(2).js"></script>

<style>
:root{
  --brand:#179aa3;
  --shirt:#034694;
  --wrong:#d62828;
  --complete:#2a9d4b;
  --bg:#f4fbfc;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  text-align:center;
}

.game-container{
  display:flex;
  justify-content:center;
  min-height:auto;
}

.card{
  width:min(96vw, 1000px);
  margin:clamp(10px, 2vh, 30px) auto;
  padding:clamp(16px, 2vw, 28px);
  background:white;
  border-radius:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.06);
  position:relative;
}

.card:fullscreen .fullscreen-btn,
.card:-webkit-full-screen .fullscreen-btn{
  position:fixed;
  top:20px;
  right:20px;
  z-index:1000;
}

.meta{
  font-size:clamp(16px, 2vw, 20px);
  margin-bottom:clamp(6px, 1vh, 12px);
}

.difficulty-badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:20px;
  font-size:0.8rem;
  font-weight:700;
  margin-bottom:10px;
  text-transform:uppercase;
}

.easy{ background:#d1fae5; color:#065f46; }
.medium{ background:#fef3c7; color:#92400e; }
.hard{ background:#fee2e2; color:#991b1b; }

.section{
  margin-top:clamp(10px, 2vh, 24px);
}

.search-wrapper{
  width:100%;
  max-width:500px;
  margin:clamp(8px, 1.5vh, 16px) auto;
  position:relative;
  z-index:300;
}

.search{
  width:100%;
  border-radius:12px;
  border:2px solid var(--brand);
  font-size:clamp(14px, 1.6vw, 16px);
  padding:clamp(10px, 1.5vh, 14px) 16px;
}

.dropdown{
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  background:white;
  border:2px solid var(--brand);
  border-radius:14px;
  max-height:260px;
  overflow-y:auto;
  z-index:400; /* higher than search wrapper */
}

.dropdown-item{
  padding:10px;
  cursor:pointer;
  font-weight:600;
}

.dropdown-item:hover{ background:#eefbfc; }

#play-area{
  transition: zoom 0.25s ease;
  display:none;
}

#game-header{
  display:none;
}

.kit-stage{
  display:flex;
  flex-direction:column;   /* IMPORTANT */
  align-items:center;
  gap:clamp(8px, 1.5vh, 16px);
  margin-top:clamp(10px, 2vh, 24px);
}

.kit-stage-wrapper{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(20px, 4vw, 60px);
  margin-top:clamp(10px, 2vh, 24px);
}

.stat-circle{
  width:clamp(90px, 10vw, 130px);
  height:clamp(90px, 10vw, 130px);
  border-radius:50%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:white;
  background:var(--shirt);
  border:3px solid rgba(255,255,255,0.4);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  transition:transform 0.2s ease;
}

.stat-circle:hover{
  transform:scale(1.05);
}

.stat-label{
  font-size:clamp(11px, 1vw, 13px);
  opacity:0.8;
  margin-bottom:4px;
}

.stat-value{
  font-size:clamp(22px, 3vw, 32px);
}

.kit-card{
  width:min(80vw,700px);
  aspect-ratio:4/3;
  background:var(--shirt);
  border-radius:28px;
  padding:clamp(18px, 2vw, 28px);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  transition:transform 0.25s ease;
  transform-origin:center top;
  z-index:1;
}

.badge{
  position:absolute;
  top:24px;
  left:24px;
  width:70px;
}

.badge img{ width:100%; }

.kit-name-arc{
  width:100%;
  height:120px;   /* more vertical room */
  margin-top:10px;
  overflow:visible;  /* prevent clipping */
}

.kit-name-arc svg{
  width:100%;
  height:100%;
}

.kit-name-arc text{
  fill:white;
  font-weight:800;
}

.kit-number{
  font-size:clamp(60px,10vw,140px);
  color:white;
  line-height:1;
}

.sponsor{
  width:55%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.sponsor img{
  max-width:200px;
  max-height:200px;
  object-fit:contain;
}

/* COMPLETED */

.completed-strip{
  width:300px;
  background:#eef7f0;
  border-left:6px solid var(--complete);
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
}

.completed-row{
  background:#eef7f0;
  border-left:6px solid var(--complete);
  font-size:clamp(14px, 1.6vw, 16px);
  padding:clamp(8px, 1vh, 12px) 14px;
  border-radius:12px;
  font-weight:600;
  display:inline-flex;              /* inline */
  align-items:center;
  gap:8px;
  white-space:nowrap;
}

.completed-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  max-width:900px;
}

button{
  margin-top:20px;
  padding:12px 24px;
  background:var(--brand);
  color:white;
  border:none;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
}

/* FULLSCREEN */

.fullscreen-btn{
  position:absolute;
  top:12px;
  right:12px;
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
}

.fullscreen-btn:hover{
  background:var(--brand);
  color:white;
  transform:translateY(-2px);
}

#menu-screen{
  margin-top:40px;
}

.menu-section{
  margin:20px 0;
}

#menu-screen select{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid var(--brand);
  font-weight:600;
}

.hint-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.hint-buttons button{
  padding:8px 16px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.3px;
  border:2px solid var(--shirt);
  background:transparent;
  color:var(--shirt);
  cursor:pointer;
  transition:all 0.2s ease;
}

/* Hover effect */
.hint-buttons button:hover:not(:disabled){
  background:var(--shirt);
  color:white;
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

/* Active click */
.hint-buttons button:active:not(:disabled){
  transform:translateY(0);
  box-shadow:none;
}

/* Disabled (used hint) */
.hint-buttons button:disabled{
  background:var(--shirt);
  color:white;
  opacity:0.6;
  cursor:not-allowed;
}

.hint-output{
  margin-top:8px;
  font-weight:600;
  color:#333;
}

.hint-area{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.hint-area button{
  font-size:clamp(12px, 1.4vw, 14px);
}

.hint-label{
  font-size:13px;
  font-weight:700;
  color:#666;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.hint-output{
  margin-bottom:8px;
  font-weight:600;
  color:#333;
  line-height:1.4;
}

.hint-output div{
  background:#f2f2f2;
  padding:6px 10px;
  border-radius:10px;
  display:inline-block;
  margin:4px;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

.stat-circle.shake {
  animation: shake 0.4s ease;
}

@keyframes scorePop {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

.stat-circle.pop {
  animation: scorePop 0.4s ease;
}

@media (max-width: 768px){

  .kit-stage-wrapper{
    flex-direction:column;
    gap:16px;
  }
  .stat-circle{
    width:80px;
    height:80px;
    font-size:14px;
  }
  .kit-card{
    width:92vw;
    padding:20px;
    border-radius:22px;
  }
  .fullscreen-btn{
    position:static;
    margin-top:10px;
  }
  .hint-buttons{
    gap:8px;
  }

  .hint-buttons button{
    padding:6px 12px;
    font-size:12px;
  }

  .hint-text{
    font-size:13px;
  }
  .section{
    margin-top:16px;
  }

  h3{
    font-size:18px;
  }
  .kit-stage-wrapper{
    flex-direction:column;
  }

  .stat-circle{
    display:flex;
    flex-direction:row;
    width:auto;
    height:auto;
    padding:8px 14px;
    border-radius:999px;
    gap:6px;
  }
}

</style>
</head>

<body>
<div data-include="../includes/header.html"></div>

<div class="game-container">
<div class="card">

<button id="fullscreenBtn" class="fullscreen-btn">Fullscreen ⛶</button>

<div id="game-header">

  <div id="difficultyBadge"></div>

</div>

<div id="menu-screen">

  <h2>Start New Game</h2>

  <div class="menu-section">
    <h3>Select Difficulty</h3>
    <select id="difficultySelect">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="menu-section">
    <h3>How far back should the chain go?</h3>
    <select id="yearSelect">
      <option value="2010">Since 2010</option>
      <option value="2000">Since 2000</option>
      <option value="1990">Since 1990</option>
    </select>
  </div>

  <button onclick="startGameFromMenu()">Start Game</button>

</div>

<div id="play-area">

  <div id="after-section" class="section">

    <h3>Who wore it after?</h3>

    <div class="hint-area">
      <div class="hint-label">💡 Hints <br>Click each hint button to reveal a clue (1/2 points per hint used)!</div>
      <div id="after-hint" class="hint-output"></div>

      <div class="hint-buttons">
        <button onclick="useHint('after','nationality')" id="after-nationality">
          Nationality
        </button>
        <button onclick="useHint('after','years')" id="after-years">
          Years
        </button>
        <button onclick="useHint('after','position')" id="after-position">
          Position
        </button>
      </div>
    </div>

    <div class="search-wrapper">
      <input 
        type="text" 
        id="search-later" 
        class="search" 
        autocomplete="off"
      >
      <div id="dropdown-later" class="dropdown"></div>
    </div>

  </div>

<div class="kit-stage-wrapper">

  <div class="stat-circle lives-circle">
    <div class="stat-label">Lives</div>
    <div class="stat-value" id="lives-circle"></div>
  </div>

  <div class="kit-stage" id="kit-stage"></div>

  <div class="stat-circle score-circle">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score-circle"></div>
  </div>

</div>

  <div id="before-section" class="section">

    <h3>Who wore it before?</h3>

    <div class="hint-area">
      <div class="hint-label">💡 Hints <br>Click each hint button to reveal a clue (1/2 points per hint used)!</div>
      <div id="before-hint" class="hint-output"></div>

      <div class="hint-buttons">
        <button onclick="useHint('before','nationality')" id="before-nationality">
          Nationality
        </button>
        <button onclick="useHint('before','years')" id="before-years">
          Years
        </button>
        <button onclick="useHint('before','position')" id="before-position">
          Position
        </button>
      </div>
    </div>

    <div class="search-wrapper">
      <input 
        type="text" 
        id="search-earlier" 
        class="search" 
        autocomplete="off"
      >
      <div id="dropdown-earlier" class="dropdown"></div>
    </div>

    <div id="message"></div>

  </div>

</div>

</div>

</div>
</div>

<div data-include="../includes/footer.html"></div>
<script src="../includes/include-html.js"></script>

<script>

/* === YOUR ORIGINAL FULL GAME LOGIC RESTORED === */

let currentRound;
let foundRange;
let lives;
let score;
let gameState;
let selectedDifficulty = "easy";
let selectedYearCutoff = 2010;
let previousLives = 3;
let previousScore = 0;
let hintsUsed = {
  before: { nationality:false, years:false, position:false },
  after:  { nationality:false, years:false, position:false }
};

let hintText = {
  before: { nationality:"", years:"", position:"" },
  after:  { nationality:"", years:"", position:"" }
};

let edgeHintCount = { before:0, after:0 };

function startRound(){

hintsUsed = {
  before: { nationality:false, years:false, position:false },
  after:  { nationality:false, years:false, position:false }
};

hintText = {
  before: { nationality:"", years:"", position:"" },
  after:  { nationality:"", years:"", position:"" }
};

edgeHintCount = { before:0, after:0 };

document.getElementById("after-section").style.display = "block";
document.getElementById("before-section").style.display = "block";

const allRounds = [];

GAME_DATA.forEach(club => {
  club.kitNumbers.forEach(kit => {

    // Filter by difficulty
    if(kit.difficulty !== selectedDifficulty) return;

    // Filter players by year cutoff
    const filteredPlayers = kit.players.filter(player => {
      const startYear = parseInt(player.years.split("-")[0]);
      return startYear >= selectedYearCutoff;
    });

    // Must have at least 2 players to form a chain
    if(filteredPlayers.length >= 2){

      allRounds.push({
        club: club.club,
        badge: club.badge,
        shirtNumber: kit.number,
        difficulty: kit.difficulty,
        players: filteredPlayers,
        primaryColor: club.primaryColor
      });

    }
  });
});

  // 🔥 ADD THE UPGRADE RIGHT HERE
  if(allRounds.length === 0){
    alert("No chains available for that selection.");
    document.getElementById("menu-screen").style.display = "block";
    document.getElementById("play-area").style.display = "none";
    return;
  }

  currentRound=allRounds[Math.floor(Math.random()*allRounds.length)];

  document.documentElement.style.setProperty("--brand",currentRound.primaryColor);
  document.documentElement.style.setProperty("--shirt",currentRound.primaryColor);

  lives=3;
  score=0;
  gameState="playing";

  const startIndex=Math.floor(Math.random()*currentRound.players.length);
  foundRange=[startIndex,startIndex];

  render();
}

function formatKitName(fullName){
  const parts=fullName.trim().split(" ");
  const prefixes=["de","da","di","van","von","del","la","le"];
  if(parts.length>1){
    const secondLast=parts[parts.length-2].toLowerCase();
    if(prefixes.includes(secondLast)){
      return (parts[parts.length-2]+" "+parts[parts.length-1]).toUpperCase();
    }
  }
  return parts[parts.length-1].toUpperCase();
}

function getAllPlayers(){
  const all=[];
  GAME_DATA.forEach(club=>{
    club.kitNumbers.forEach(kit=>{
      kit.players.forEach(p=>all.push(p.name));
    });
  });
  return [...new Set(all)];
}

function render(){

document.getElementById("lives-circle").textContent = lives;
document.getElementById("score-circle").textContent = score;

const livesCircle = document.querySelector(".lives-circle");
const scoreCircle = document.querySelector(".score-circle");

// Lives decreased → shake
if(lives < previousLives){
  livesCircle.classList.remove("shake");
  void livesCircle.offsetWidth; // force reflow
  livesCircle.classList.add("shake");
}

// Score increased → pop
if(score > previousScore){
  scoreCircle.classList.remove("pop");
  void scoreCircle.offsetWidth; // force reflow
  scoreCircle.classList.add("pop");
}

previousLives = lives;
previousScore = score;

  const badge = document.getElementById("difficultyBadge");
  badge.innerHTML = `
    <span class="difficulty-badge ${currentRound.difficulty}">
      ${currentRound.club} No.${currentRound.shirtNumber} – ${currentRound.difficulty}
    </span>
  `;

  const stage = document.getElementById("kit-stage");
  stage.innerHTML = "";

  if(gameState === "won"){ renderCompleted(); return; }
  if(gameState === "lost"){ renderFailed(); return; }

  function renderCard(index){
    const player = currentRound.players[index];
    const lastName = formatKitName(player.name);

    const card = document.createElement("div");
    card.className = "kit-card";

// Adjust arc height based on length
let curveHeight = 35;

if (lastName.length <= 5) curveHeight = 45;
if (lastName.length >= 8) curveHeight = 30;
if (lastName.length >= 10) curveHeight = 25;
if (lastName.length >= 12) curveHeight = 20;

card.innerHTML = `
  <div class="badge"><img src="${currentRound.badge}"></div>

  <div class="kit-name-arc">
    <svg viewBox="0 0 340 180">
      <defs>
        <path id="curve${index}" d="M20,140 Q170,${curveHeight} 320,140" />
      </defs>

      <text
        text-anchor="middle"
        font-size="34"
        font-weight="800"
        fill="white"
      >
        <textPath href="#curve${index}" startOffset="50%">
          ${lastName}
        </textPath>
      </text>

    </svg>
  </div>

  <div class="kit-number">${currentRound.shirtNumber}</div>
  <div class="sponsor">
    <img src="${player.sponsor}">
  </div>
`;

    stage.appendChild(card);
  }

function renderCompleteStrip(index){
  const player = currentRound.players[index];
  const strip = document.createElement("div");
  strip.className = "completed-row";
  strip.innerHTML = `
    <span>✓ ${player.name}</span>
    <span>${player.years}</span>
  `;
  stage.appendChild(strip);
}

/* =========================
   RENDER DISCOVERED WINDOW
   ========================= */

for(let i = foundRange[1]; i >= foundRange[0]; i--){

  const isLowerEdge = i === foundRange[0];
  const isUpperEdge = i === foundRange[1];

  const canGoLower = foundRange[0] > 0;
  const canGoUpper = foundRange[1] < currentRound.players.length - 1;

  // Show shirt only if it's an edge AND that direction still has players
  if(
    (isLowerEdge && canGoLower) ||
    (isUpperEdge && canGoUpper)
  ){
    renderCard(i);
  }
  else{
    renderCompleteStrip(i);
  }
}

  for(let i = foundRange[0] - 1; i >= 0; i--){
    // undiscovered older players → show nothing
  }

  /* =========================
     Hide search when complete
     ========================= */
const noAfter = foundRange[1] === currentRound.players.length - 1;
const noBefore = foundRange[0] === 0;

// AFTER section
document.querySelector("#after-section h3").style.display =
  noAfter ? "none" : "block";

document.querySelector("#after-section .search-wrapper").style.display =
  noAfter ? "none" : "block";

document.querySelector("#after-section .hint-area").style.display =
  noAfter ? "none" : "block";

// BEFORE section
document.querySelector("#before-section h3").style.display =
  noBefore ? "none" : "block";

document.querySelector("#before-section .search-wrapper").style.display =
  noBefore ? "none" : "block";

document.querySelector("#before-section .hint-area").style.display =
  noBefore ? "none" : "block";

  document.getElementById("search-earlier").value = "";
  document.getElementById("search-later").value = "";

  requestAnimationFrame(scalePlayAreaToFit);
  renderHints();
}

function useHint(direction, type){

  if(gameState !== "playing") return;
  if(hintsUsed[direction][type]) return;

  const isBefore = direction === "before";
  const index = isBefore 
    ? foundRange[0] - 1 
    : foundRange[1] + 1;

  if(index < 0 || index >= currentRound.players.length) return;

  const player = currentRound.players[index];

  hintsUsed[direction][type] = true;
  edgeHintCount[direction]++;

  if(type === "nationality"){
    hintText[direction][type] =
      "Nationality: " + (player.nationality || "Unknown");
  }

  if(type === "years"){
    hintText[direction][type] =
      "Years: " + player.years;
  }

  if(type === "position"){
    hintText[direction][type] =
      "Position: " + (player.position || "Unknown");
  }

  renderHints();
}

function renderHints(){

  ["before","after"].forEach(direction => {

    const output = document.getElementById(direction + "-hint");

    const texts = [];

    if(hintsUsed[direction].nationality){
      texts.push(hintText[direction].nationality);
    }

    if(hintsUsed[direction].years){
      texts.push(hintText[direction].years);
    }

    if(hintsUsed[direction].position){
      texts.push(hintText[direction].position);
    }

    // Render hint text
    output.innerHTML = texts.map(t => `<div>${t}</div>`).join("");

    // ALWAYS reset buttons first
    document.getElementById(direction + "-nationality").disabled =
      hintsUsed[direction].nationality;

    document.getElementById(direction + "-years").disabled =
      hintsUsed[direction].years;

    document.getElementById(direction + "-position").disabled =
      hintsUsed[direction].position;

  });
}

function scalePlayAreaToFit(){

  const playArea = document.getElementById("play-area");

  playArea.style.zoom = "1";

  const viewportHeight = window.innerHeight;
  const playTop = playArea.getBoundingClientRect().top;
  const availableHeight = viewportHeight - playTop - 100;

  const fullHeight = playArea.scrollHeight;

  if(fullHeight <= availableHeight){
    return;
  }

  const scale = availableHeight / fullHeight;

  playArea.style.zoom = scale;
}

function renderCompleted(){

  // Hide both guess sections completely
  document.getElementById("after-section").style.display = "none";
  document.getElementById("before-section").style.display = "none";

  document.getElementById("kit-stage").innerHTML=`
    <h2>🎉 Chain Complete!</h2>
    ${[...currentRound.players].reverse().map(p=>`
      <div class="completed-row">
        <span>${p.name}</span>
        <span>${p.years}</span>
      </div>
    `).join("")}
    <button onclick="returnToMenu()">New Round</button>
  `;
}

function renderFailed(){

  // Hide both guess sections completely
  document.getElementById("after-section").style.display = "none";
  document.getElementById("before-section").style.display = "none";

  document.getElementById("kit-stage").innerHTML=`
    <h2>❌ Out of Lives</h2>
    ${[...currentRound.players].reverse().map(p=>`
      <div class="completed-row">
        <span>${p.name}</span>
        <span>${p.years}</span>
      </div>
    `).join("")}
    <button onclick="returnToMenu()">New Round</button>
  `;
}

function handleGuess(direction, name){

  if(gameState !== "playing") return;

  name = name.toLowerCase();

if(direction === "before"){

  if(foundRange[0] > 0){
    const expected = currentRound.players[foundRange[0] - 1];

if(expected && name === expected.name.toLowerCase()){

  // STEP 7 — Calculate points based on hints used
  let points = 1 / Math.pow(2, edgeHintCount.before);
  score += points;

  // Move chain
  foundRange[0]--;

  // STEP 8 — Reset hints for this side
  hintsUsed.before = { nationality:false, years:false, position:false };
  hintText.before = { nationality:"", years:"", position:"" };
  edgeHintCount.before = 0;

} else {
  lives--;
}
  }
}

if(direction === "after"){

  if(foundRange[1] < currentRound.players.length - 1){
    const expected = currentRound.players[foundRange[1] + 1];

if(expected && name === expected.name.toLowerCase()){

  // STEP 7 — Calculate points based on hints used
  let points = 1 / Math.pow(2, edgeHintCount.after);
  score += points;

  // Move chain
  foundRange[1]++;

  // STEP 8 — Reset hints for this side
  hintsUsed.after = { nationality:false, years:false, position:false };
  hintText.after = { nationality:"", years:"", position:"" };
  edgeHintCount.after = 0;

} else {
  lives--;
}
  }
}

  if(lives <= 0){
    gameState = "lost";
  }

  if(
    foundRange[0] === 0 &&
    foundRange[1] === currentRound.players.length - 1
  ){
    gameState = "won";
  }

  render();
}

function returnToMenu(){

  // Hide game UI
  document.getElementById("play-area").style.display = "none";
  document.getElementById("game-header").style.display = "none";

  // Show menu
  document.getElementById("menu-screen").style.display = "block";

  // Optional cleanup
  document.getElementById("kit-stage").innerHTML = "";
  document.getElementById("message").innerHTML = "";

}

function startGameFromMenu(){

  selectedDifficulty = document.getElementById("difficultySelect").value;
  selectedYearCutoff = parseInt(document.getElementById("yearSelect").value);

  document.getElementById("menu-screen").style.display = "none";
  document.getElementById("play-area").style.display = "block";
  document.getElementById("game-header").style.display = "block";

  startRound();
}

function setupAutocomplete(inputId,dropdownId,direction){

  const input=document.getElementById(inputId);
  const dropdown=document.getElementById(dropdownId);

  input.addEventListener("input",function(){

    const value=this.value.toLowerCase();
    dropdown.innerHTML="";
    if(!value)return;

    getAllPlayers().forEach(name=>{
      if(name.toLowerCase().includes(value)){
        const div=document.createElement("div");
        div.className="dropdown-item";
        div.textContent=name;
        div.onclick=()=>{
          input.value="";
          dropdown.innerHTML="";
          handleGuess(direction,name);
        };
        dropdown.appendChild(div);
      }
    });
  });
}

setupAutocomplete("search-earlier","dropdown-earlier","before");
setupAutocomplete("search-later","dropdown-later","after");

/* FULLSCREEN */

const fullscreenBtn=document.getElementById("fullscreenBtn");

fullscreenBtn.addEventListener("click",()=>{
  const card=document.querySelector(".card");
  if(!document.fullscreenElement){
    card.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
});

document.addEventListener("fullscreenchange", () => {

  const playArea = document.getElementById("play-area");

  // Hard reset transform first
  playArea.style.transform = "scale(1)";

  // Force browser reflow
  void playArea.offsetHeight;

  // Wait one frame AFTER layout settles
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      scalePlayAreaToFit();
    });
  });

});
window.addEventListener("resize", () => {
  scalePlayAreaToFit();
});
</script>
